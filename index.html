<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout Inteligente - Debug Mode</title>
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: #f4f7f6;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .checkout-card {
            background: white; /* Corrigido o 'zrgb' anterior */
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            width: 350px;
        }

        h2 { color: #2c3e50; text-align: center; margin-top: 0; }
        .input-group { margin-bottom: 1.2rem; }
        label { display: block; margin-bottom: 5px; color: #666; font-size: 0.9rem; }

        input, select {
            width: 100%;
            padding: 10px;
            border: 1px solid #b5da9c;
            border-radius: 6px;
            box-sizing: border-box;
        }

        button {
            width: 100%;
            padding: 12px;
            background-color: #27ae60;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
        }

        button:hover { background-color: #219150; }

        #resultado { 
            margin-top: 20px; 
            padding: 10px; 
            background: #eef9f1; 
            border-radius: 8px;
            text-align: center;
            min-height: 40px;
        }
        
        .erro { color: #e74c3c; font-weight: bold; }
    </style>
</head>
<body>

<div class="checkout-card">
    <h2>🛒 Checkout</h2>
    <form id="checkoutForm">
        <div class="input-group">
            <label>Preço Unitário (R$):</label>
            <input type="text" id="inputPreco" value="125.50">
        </div>

        <div class="input-group">
            <label>Quantidade:</label>
            <input type="text" id="inputQtd" value="3">
        </div>

        <div class="input-group">
            <label>Cupom de Desconto?</label>
            <select id="inputCupom">
                <option value="true">Sim (10% OFF)</option>
                <option value="false">Não</option>
            </select>
        </div>

        <button type="submit">Calcular Agora</button>
    </form>

    <div id="resultado">Aguardando cálculo...</div>
</div>

<script>
    document.getElementById('checkoutForm').addEventListener('submit', function(event) {
        // Impede a página de recarregar (isso mataria o log do console)
        event.preventDefault(); 
        
        console.log("--- Iniciando Processamento ---");

        // 1. Captura (Sempre Strings)
        const precoRaw = document.getElementById('inputPreco').value;
        const qtdRaw = document.getElementById('inputQtd').value;
        const cupomRaw = document.getElementById('inputCupom').value;

        console.log("Valores Brutos (String):", { precoRaw, qtdRaw, cupomRaw });

        // 2. Conversão (Casting)
        const preco = parseFloat(precoRaw);
        const qtd = parseInt(qtdRaw);
        const temCupom = (cupomRaw === "true"); // Converte string "true" para boolean true

        console.log("Valores Convertidos:", { preco, qtd, temCupom });

        // 3. Validação
        if (isNaN(preco) || isNaN(qtd)) {
            console.error("Erro: Valores numéricos inválidos detectados.");
            document.getElementById('resultado').innerHTML = '<span class="erro">⚠️ Digite números válidos!</span>';
            return;
        }

        // 4. Cálculos
        let subtotal = preco * qtd;
        let valorFinal = subtotal;

        if (temCupom) {
            valorFinal = subtotal * 0.90; // Aplica 10%
            console.log("Desconto de 10% aplicado.");
        }

        // 5. Saída no HTML e no Console
        const resultadoFinal = valorFinal.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
        
        console.log("Resultado Final:", resultadoFinal);
        document.getElementById('resultado').innerHTML = `Total: <strong>${resultadoFinal}</strong>`;
    });
</script>

</body>
</html>
